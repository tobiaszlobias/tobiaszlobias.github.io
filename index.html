<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Básnička pro Anetku</title>
    <style>
      body {
        font-family: 'Arial', sans-serif;
        background-color: #f0f8ff;
        color: #333;
        text-align: center;
        padding: 50px;
      }
      .poem-container {
        background-color: #b05c5c;
        border: 2px solid #722727;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        display: inline-block;
        max-width: 600px;
      }
      .poem-title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 20px;
      }
      .poem {
        font-size: 18px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="poem-container">
      <div class="poem-title">Básnička pro maminku</div>
      <div class="poem">
        <p>anetko,moje mila planetko<br>
        ziti stebou je muj sen, <br>
        zda se mi den co den <br>
        zivot bez tebe je nocni mura <br>
        pripada mi jako stvura </p>

        <p>udelam cokoliv abych stvuru znicil<br>
        a zivot stebou se mi splnil<br>
        miluji te den co den<br>
        jen doufam ze muj sen bude naplnen</p>
      </div>
      <p1>© 2008 TOBIBOSS</p1>
    </div>
  </body>
  
</html>
